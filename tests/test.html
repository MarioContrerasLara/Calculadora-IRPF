'use strict';

// ─── Test framework ───────────────────────────────────────

let _passed = 0, _failed = 0;
const _groups = [];
let _currentGroup = null;

function group(name) {
    _currentGroup = { name, tests: [] };
    _groups.push(_currentGroup);
}

function assert(description, condition, detail) {
    const ok = !!condition;
    if (ok) _passed++; else _failed++;
    _currentGroup.tests.push({ description, ok, detail: detail || '' });
}

function assertClose(description, actual, expected, tolerance) {
    tolerance = tolerance ?? 0.01;
    const ok = Math.abs(actual - expected) <= tolerance;
    const detail = ok ? '' : `expected ≈ ${expected}, got ${actual} (diff ${Math.abs(actual - expected).toFixed(4)})`;
    assert(description, ok, detail);
}

function assertEqual(description, actual, expected) {
    const ok = actual === expected;
    const detail = ok ? '' : `expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`;
    assert(description, ok, detail);
}

function render() {
    const out = document.getElementById('output');
    const sum = document.getElementById('summary');

    sum.textContent = `${_passed + _failed} tests: ${_passed} passed, ${_failed} failed`;
    sum.className = 'summary ' + (_failed === 0 ? 'pass' : 'fail');

    out.innerHTML = _groups.map(g => {
        const html = g.tests.map(t =>
            `<div class="test ${t.ok ? 'pass' : 'fail'}">` +
            `${t.ok ? '✅' : '❌'} ${t.description}` +
            (t.detail ? `<div class="detail">${t.detail}</div>` : '') +
            `</div>`
        ).join('');
        return `<div class="group"><h2>${g.name}</h2>${html}</div>`;
    }).join('');
}

group('Transport annual cap');

// Under cap → no change
(function() {
    let ad = 50 * 12;   // 600
    let fl = 50 * 12;   // 600
    const raw = ad + fl; // 1200 < 1500
    assert('1200 under 1500 cap → no capping', raw <= ESPECIE.transporteExentoAnual);
})();

// Over cap → proportional reduction
(function() {
    let ad = 100 * 12;  // 1200
    let fl = 50 * 12;   // 600
    const raw = ad + fl; // 1800
    assert('1800 over 1500 cap', raw > ESPECIE.transporteExentoAnual);
    const ratio = ESPECIE.transporteExentoAnual / raw;
    ad = ad * ratio;
    fl = fl * ratio;
    assertClose('Capped ad = 1000', ad, 1000);
    assertClose('Capped fl = 500', fl, 500);
    assertClose('Capped total = 1500', ad + fl, 1500);
})();

(function() {

    document.getElementById('espSeguroMedicoAd').value = '';
    document.getElementById('espSeguroMedicoFl').value = '';

    document.getElementById('espTicketRestFl').value = '';
    document.getElementById('espTicketRestDias').value = '220';
    document.getElementById('espTransporteAd').value = '';
    document.getElementById('espTransporteFl').value = '';

    // Suppress scrollIntoView (not available in hidden test)
    const origScroll = Element.prototype.scrollIntoView;
    Element.prototype.scrollIntoView = function() {};

    calcular();

    Element.prototype.scrollIntoView = origScroll;

    // Verify hero cards contain expected values
    const hero = document.getElementById('heroGrid').innerHTML;
    assert('Hero contains "Salario bruto"', hero.includes('Salario bruto'));
    assert('Hero contains "30.000,00"', hero.includes('30.000,00'));
    assert('Hero contains "Salario neto anual"', hero.includes('Salario neto anual'));
    assert('Hero contains IRPF total', hero.includes('IRPF total'));
    assert('Hero contains SS trabajador', hero.includes('Seg. Social trabajador'));

    // Verify SS table was populated
    const ssTb = document.getElementById('tbSS').innerHTML;
    assert('SS table has contingencias comunes', ssTb.includes('Contingencias comunes'));
    assert('SS table has MEI', ssTb.includes('MEI'));

    // Verify IRPF flow shows base liquidable
    const flow = document.getElementById('tbFlow').innerHTML;
    assert('Flow has rendimiento íntegro', flow.includes('Rendimiento íntegro'));
    assert('Flow has base liquidable', flow.includes('Base liquidable'));

    // Known values for 30k bruto:
    // Base SS mensual = max(30000/12, 1381.20) = 2500, capped at 4909.50 → 2500
    // CC worker: 2500*4.70%*12 = 1410
    // Desempleo indef: 2500*1.55%*12 = 465
    // FP: 2500*0.10%*12 = 30
    // MEI: 2500*0.13%*12 = 39
    // Total SS = 1944
    const expectedSS = 2500 * (4.70 + 1.55 + 0.10 + 0.13) / 100 * 12;
    const ssFooter = document.getElementById('tfSS').innerHTML;
    // Check the SS total appears in the footer  
    assert('SS footer shows worker total ≈ 1944', ssFooter.includes('1.944,00'));

    // rendIntegro = 30000 (no especie)
    // gastosDeducibles = 1944 + 2000 = 3944
    // rendNeto = 30000 - 3944 = 26056
    // reduccion = 0 (>17673.52)
    // baseLiquidable = 26056
    const rendNeto = 30000 - expectedSS - 2000;
    assertClose('rendNeto ≈ 26056', rendNeto, 26056, 1);
    const reduccion = reduccionRendimientos(rendNeto);
    assertClose('Reducción = 0 (high income)', reduccion, 0);
    const baseLiq = rendNeto - reduccion;

    // IRPF estatal for baseLiq ≈ 26056
    const estCuota = aplicarEscala(baseLiq, ESCALA_ESTATAL);
    const minEst = aplicarEscala(5550, ESCALA_ESTATAL);
    const cuotaEst = Math.max(estCuota.total - minEst.total, 0);

    // IRPF autonómico for baseLiq ≈ 26056
    const autCuota = aplicarEscala(baseLiq, ESCALA_ANDALUCIA);
    const minAut = aplicarEscala(5790, ESCALA_ANDALUCIA);
    const cuotaAut = Math.max(autCuota.total - minAut.total, 0);

    const totalIRPF = cuotaEst + cuotaAut;
    const neto = 30000 - expectedSS - totalIRPF;

    // Just check the results are in a reasonable range
    assert('IRPF total > 0 for 30k', totalIRPF > 0);
    assert('IRPF total < 10000 for 30k', totalIRPF < 10000);
    assert('Neto > 20000 for 30k', neto > 20000);
    assert('Neto < 30000 for 30k', neto < 30000);
})();
