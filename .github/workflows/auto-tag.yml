name: Auto Tag on Merge

on:
  push:
    branches: [ main ]

jobs:
  tag:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Get last tag and commit
      id: tag_info
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
        COMMIT_HASH=$(git rev-parse --short HEAD)
        echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
        echo "Previous tag: $LAST_TAG"
        echo "New commit: $COMMIT_HASH"
    
    - name: Determine next version
      id: semver
      run: |
        LAST_TAG=${{ steps.tag_info.outputs.last_tag }}
        # Extract version numbers
        MAJOR=$(echo $LAST_TAG | cut -d. -f1 | sed 's/v//')
        MINOR=$(echo $LAST_TAG | cut -d. -f2)
        PATCH=$(echo $LAST_TAG | cut -d. -f3)
        
        # Increment patch version (features are patches for now)
        PATCH=$((PATCH + 1))
        NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
        
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
        echo "Previous: $LAST_TAG"
        echo "New: $NEW_TAG"
    
    - name: Create git tag
      run: |
        NEW_TAG=${{ steps.semver.outputs.new_tag }}
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        git tag -a "$NEW_TAG" -m "Tag: $NEW_TAG - Auto-generated on merge to main"
        git push origin "$NEW_TAG"
        
        echo "✅ Created and pushed tag: $NEW_TAG"
    
    - name: Tag Summary
      run: |
        echo "## Tag Created ✅"
        echo "Tag: ${{ steps.semver.outputs.new_tag }}"
        echo "Commit: ${{ steps.tag_info.outputs.commit_hash }}"
        echo ""
        echo "**Note:** Tag created automatically on merge to main."
        echo "Use \`gh release create\` to create a GitHub Release if needed."
